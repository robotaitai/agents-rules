nd openable in Obsidian</li>\n<li><strong>Decision</strong>: Real knowledge at <code>~/agent-os/projects/&lt;slug&gt;/</code>, project repo gets <code>./agent-knowledge</code> symlink</li>\n<li><strong>Status</strong>: Active</li>\n</ul>\n<br>\n<h2>004 - Zero-arg init with auto-detection {#004}</h2>\n<br>\n<ul>\n<li><strong>Date</strong>: 2026-04-08</li>\n<li><strong>Context</strong>: Reduce friction for new project setup</li>\n<li><strong>Decision</strong>: [[cli#init (zero-arg)|init]] infers slug from dir name, auto-detects [[integrations|Cursor/Claude/Codex]]</li>\n<li><strong>Status</strong>: Active</li>\n</ul>\n<br>\n<h2>005 - Automatic onboarding via AGENTS.md + STATUS.md {#005}</h2>\n<br>\n<ul>\n<li><strong>Date</strong>: 2026-04-08</li>\n<li><strong>Context</strong>: Agents should start maintaining knowledge without extra user commands</li>\n<li><strong>Decision</strong>: [[STATUS]] tracks onboarding state, <code>AGENTS.md</code> instructs agents, [[integrations|bridge files]] reinforce</li>\n<li><strong>Status</strong>: Active</li>\n</ul>\n<br>\n<h2>006 - Inline Cursor rule content in Python {#006}</h2>\n<br>\n<ul>\n<li><strong>Date</strong>: 2026-04-08</li>\n<li><strong>Context</strong>: pip had a rare bug extracting <code>.mdc</code> files from wheels during editable installs</li>\n<li><strong>Decision</strong>: Inline rule content as a Python string in <code>integrations.py</code> (see [[gotchas]])</li>\n<li><strong>Status</strong>: Active (workaround)</li>\n</ul>\n<br>\n<h2>See Also</h2>\n<br>\n<ul>\n<li>[[architecture]] -- where these decisions are applied</li>\n<li>[[gotchas]] -- problems these decisions solve</li>\n</ul>\n<br>"}, {"path": "Memory/deployments.md", "title": "Deployments", "note_type": "durable-branch", "area": "deployments", "canonical": true, "folder": "Memory", "is_branch_entry": false, "summary": "Release, CI, and distribution strategy. **0.0.1** (tagged `v0.0.1`). See [[packaging]]. [[testing|GitHub Actions]] (`.github/workflows/ci.yml`): - Triggered on push/PR to `main` - Matrix: `ubuntu-late...", "html": "<h1>Deployments</h1>\n<br>\n<p>Release, CI, and distribution strategy.</p>\n<br>\n<h2>Version</h2>\n<br>\n<p><strong>0.0.1</strong> (tagged <code>v0.0.1</code>). See [[packaging]].</p>\n<br>\n<h2>CI Pipeline</h2>\n<br>\n<p>[[testing|GitHub Actions]] (<code>.github/workflows/ci.yml</code>):</p>\n<ul>\n<li>Triggered on push/PR to <code>main</code></li>\n<li>Matrix: <code>ubuntu-latest</code> + <code>macos-latest</code>, Python 3.10/3.12/3.13</li>\n<li><strong>test</strong> job: pytest with editable install</li>\n<li><strong>build</strong> job: wheel build + installed [[cli|CLI]] smoke test</li>\n</ul>\n<br>\n<h2>Distribution</h2>\n<br>\n<ul>\n<li><code>pip install agent-knowledge</code> (PyPI-ready, not yet published)</li>\n<li>Build: <code>python -m build</code> produces wheel and sdist</li>\n<li>Local dev: <code>pip install -e &quot;.[dev]&quot;</code> inside a venv (see [[gotchas]])</li>\n</ul>\n<br>\n<h2>No Server Components</h2>\n<br>\n<p>No Docker, no container deployment, no API server. See [[stack]].</p>\n<br>\n<h2>See Also</h2>\n<br>\n<ul>\n<li>[[packaging]] -- build system details</li>\n<li>[[testing]] -- what CI runs</li>\n<li>[[stack]] -- runtime requirements</li>\n</ul>\n<br>"}, {"path": "Memory/gotchas.md", "title": "Gotchas", "note_type": "durable-branch", "area": "gotchas", "canonical": true, "folder": "Memory", "is_branch_entry": false, "summary": "Known pitfalls, traps, and non-obvious behaviors. - `set -euo pipefail` + trailing `[ \"$DRY_RUN\" -eq 1 ] && log ...` causes exit 1 when test is false. Use `if/then` instead. See [[conventions]]. - `sh...", "html": "<h1>Gotchas</h1>\n<br>\n<p>Known pitfalls, traps, and non-obvious behaviors.</p>\n<br>\n<h2>Shell Scripts</h2>\n<br>\n<ul>\n<li><code>set -euo pipefail</code> + trailing <code>[ &quot;$DRY_RUN&quot; -eq 1 ] &amp;&amp; log ...</code> causes exit 1 when test is false. Use <code>if/then</code> instead. See [[conventions]].</li>\n<li><code>ship.sh</code> uses <code>python -m pytest -q</code> not bare <code>pytest</code> -- bare <code>pytest</code> fails outside venvs. See [[testing]].</li>\n</ul>\n<br>\n<h2>Python / pip</h2>\n<br>\n<ul>\n<li>macOS system Python refuses <code>pip install</code> (&quot;externally managed&quot;). Use brew python + <code>--user --break-system-packages</code>, or a venv. See [[stack]].</li>\n<li>Old system pip (e.g. 21.2.4) doesn&#x27;t support PEP 660 editable installs with <code>pyproject.toml</code>. Need pip &gt;= 21.3.</li>\n<li>Venv can get corrupted if multiple Python versions coexist in <code>.venv/lib/</code>. Fix: <code>rm -rf .venv</code> and recreate with explicit version.</li>\n</ul>\n<br>\n<h2>[[packaging|Packaging]]</h2>\n<br>\n<ul>\n<li>[[architecture|hatchling]] editable installs copy <code>src/</code> files to <code>site-packages</code>. Changes to <code>assets/</code> require rebuild to take effect in the wheel. Source Python files update live.</li>\n<li>pip may silently skip extracting <code>.mdc</code> files from wheels. Workaround: [[integrations|inline critical content in Python code]]. See [[decisions#006]].</li>\n</ul>\n<br>\n<h2>Sync</h2>\n<br>\n<ul>\n<li><code>stamp_status</code> regex must use <code>[ \\t]<em></code> not <code>\\s</em></code> to avoid eating newlines across YAML frontmatter fields. Fixed in <code>runtime/sync.py</code>.</li>\n</ul>\n<br>\n<h2>See Also</h2>\n<br>\n<ul>\n<li>[[conventions]] -- rules designed to avoid these</li>\n<li>[[testing]] -- tests that catch regressions</li>\n<li>[[decisions|Decisions]] -- why certain workarounds exist</li>\n</ul>\n<br>"}, {"path": "Memory/integrations.md", "title": "Integrations", "note_type": "durable-branch", "area": "integrations", "canonical": true, "folder": "Memory", "is_branch_entry": false, "summary": "Multi-tool detection and bridge file installation for Cursor, Claude, and Codex. | Tool | Detection | Always installed? | |------|-----------|-------------------| | Cursor | `.cursor/` exists | Yes (d...", "html": "<h1>Integrations</h1>\n<br>\n<p>Multi-tool detection and bridge file installation for Cursor, Claude, and Codex.</p>\n<br>\n<h2>Detection (`runtime/integrations.py`)</h2>\n<br>\n<p>| Tool | Detection | Always installed? |</p>\n<p>|------|-----------|-------------------|</p>\n<p>| Cursor | <code>.cursor/</code> exists | Yes (default integration) |</p>\n<p>| Claude | <code>.claude/</code> exists | Only if detected |</p>\n<p>| Codex | <code>.codex/</code> exists | Only if detected |</p>\n<br>\n<p>Called by [[cli#init (zero-arg)|init]] via <code>detect()</code> then <code>install_all()</code>.</p>\n<br>\n<h2>Bridge Files</h2>\n<br>\n<h3>Cursor</h3>\n<ul>\n<li><code>.cursor/hooks.json</code> -- post-write hook calling <code>agent-knowledge update</code></li>\n<li><code>.cursor/rules/agent-knowledge.mdc</code> -- <code>alwaysApply</code> rule: read [[STATUS]] on session start</li>\n</ul>\n<br>\n<h3>Claude</h3>\n<ul>\n<li><code>CLAUDE.md</code> at project root -- directs to <code>AGENTS.md</code> and [[STATUS]]</li>\n</ul>\n<br>\n<h3>Codex</h3>\n<ul>\n<li><code>.codex/AGENTS.md</code> -- directs to root <code>AGENTS.md</code> and [[STATUS]]</li>\n</ul>\n<br>\n<h2>Onboarding Handoff</h2>\n<br>\n<p>Bridge files instruct agents to check [[STATUS|STATUS.md]]:</p>\n<ul>\n<li>If <code>onboarding: pending</code> -&gt; follow <code>AGENTS.md</code> first-time instructions</li>\n<li>If <code>onboarding: complete</code> -&gt; read [[MEMORY]] for context</li>\n</ul>\n<br>\n<p>No manual <code>next-prompt</code> command needed.</p>\n<br>\n<h2>Key Decision</h2>\n<br>\n<p>Cursor rule content is <strong>inlined as a Python string</strong> in <code>integrations.py</code> instead of loaded from a template. See [[gotchas]] and [[decisions#006]].</p>\n<br>\n<h2>See Also</h2>\n<br>\n<ul>\n<li>[[cli#init (zero-arg)|init command]] -- orchestrates detection and install</li>\n<li>[[architecture#Integration System]] -- design overview</li>\n<li>[[testing]] -- integration test coverage</li>\n</ul>\n<br>"}, {"path": "Memory/packaging.md", "title": "Packaging", "note_type": "durable-branch", "area": "packaging", "canonical": true, "folder": "Memory", "is_branch_entry": false, "summary": "Python [[stack|packaging]] strategy for making agent-knowledge pip-installable. - Backend: **hatchling** via `pyproject.toml` - Layout: src-layout at `src/agent_knowledge/` - Entry point: `agent-knowl...", "html": "<h1>Packaging</h1>\n<br>\n<p>Python [[stack|packaging]] strategy for making agent-knowledge pip-installable.</p>\n<br>\n<h2>Build System</h2>\n<br>\n<ul>\n<li>Backend: <strong>hatchling</strong> via <code>pyproject.toml</code></li>\n<li>Layout: src-layout at <code>src/agent_knowledge/</code></li>\n<li>Entry point: <code>agent-knowledge = agent_knowledge.cli:main</code></li>\n</ul>\n<br>\n<h2>Asset Bundling</h2>\n<br>\n<p>All non-Python assets consolidated under <code>assets/</code> at repo root. Bundled into wheel via <code>[tool.hatch.build.targets.wheel.force-include]</code>:</p>\n<ul>\n<li><code>assets/scripts</code> -&gt; <code>agent_knowledge/assets/scripts</code></li>\n<li><code>assets/templates</code> -&gt; <code>agent_knowledge/assets/templates</code></li>\n<li><code>assets/rules</code> -&gt; <code>agent_knowledge/assets/rules</code></li>\n<li>(and rules-global, commands, skills, skills-cursor, claude)</li>\n</ul>\n<br>\n<p>See [[architecture#Path Resolution]] for how the code finds these at runtime.</p>\n<br>\n<h2>Version</h2>\n<br>\n<p>Current: <strong>0.0.1</strong> (tagged <code>v0.0.1</code>). See [[deployments]].</p>\n<br>\n<h2>Dependencies</h2>\n<br>\n<p>See [[stack#Dependencies]] for the full list.</p>\n<br>\n<h2>See Also</h2>\n<br>\n<ul>\n<li>[[stack]] -- runtimes and frameworks</li>\n<li>[[architecture]] -- package layout</li>\n<li>[[gotchas]] -- pip installation pitfalls</li>\n<li>[[decisions#001|Decision: hatchling over setuptools]]</li>\n</ul>\n<br>"}, {"path": "Memory/stack.md", "title": "Stack", "note_type": "durable-branch", "area": "stack", "canonical": true, "folder": "Memory", "is_branch_entry": false, "summary": "Languages, runtimes, frameworks, and tooling used by agent-knowledge. - **Python 3.9+** -- package code, [[cli|CLI]], [[testing|tests]] - **Bash** -- bundled scripts in `assets/scripts/` (see [[archit...", "html": "<h1>Stack</h1>\n<br>\n<p>Languages, runtimes, frameworks, and tooling used by agent-knowledge.</p>\n<br>\n<h2>Languages &amp; Runtimes</h2>\n<br>\n<ul>\n<li><strong>Python 3.9+</strong> -- package code, [[cli|CLI]], [[testing|tests]]</li>\n<li><strong>Bash</strong> -- bundled scripts in <code>assets/scripts/</code> (see [[architecture]])</li>\n</ul>\n<br>\n<h2>Build &amp; Packaging</h2>\n<br>\n<ul>\n<li><strong>[[packaging|hatchling]]</strong> via <code>pyproject.toml</code>, src-layout at <code>src/agent_knowledge/</code></li>\n<li>Wheel includes all non-Python assets via <code>force-include</code></li>\n</ul>\n<br>\n<h2>Dependencies</h2>\n<br>\n<ul>\n<li><strong>click &gt;= 8.0</strong> -- [[cli|CLI framework]]</li>\n<li><strong>tiktoken</strong> (optional) -- token measurement</li>\n<li><strong>pytest &gt;= 7.0</strong> (dev) -- [[testing]]</li>\n<li><strong>python-build</strong> (dev) -- wheel/sdist building</li>\n</ul>\n<br>\n<h2>CI/CD</h2>\n<br>\n<ul>\n<li>[[deployments|GitHub Actions]] -- Python 3.10, 3.12, 3.13 on Ubuntu + macOS</li>\n</ul>\n<br>\n<h2>What This Is Not</h2>\n<br>\n<ul>\n<li>No frontend, no database, no API server, no Docker</li>\n</ul>\n<br>\n<h2>See Also</h2>\n<br>\n<ul>\n<li>[[packaging]] -- how the package is built and distributed</li>\n<li>[[architecture]] -- how the code is structured</li>\n<li>[[deployments]] -- CI pipeline details</li>\n</ul>\n<br>"}, {"path": "Memory/testing.md", "title": "Testing", "note_type": "durable-branch", "area": "testing", "canonical": true, "folder": "Memory", "is_branch_entry": false, "summary": "Test strategy for [[packaging]] validation and [[cli|CLI]] correctness. [[stack|pytest]] (dev dependency). 46 tests across 2 files. [[deployments|GitHub Actions]] (`.github/workflows/ci.yml`): - **tes...", "html": "<h1>Testing</h1>\n<br>\n<p>Test strategy for [[packaging]] validation and [[cli|CLI]] correctness.</p>\n<br>\n<h2>Framework</h2>\n<br>\n<p>[[stack|pytest]] (dev dependency). 46 tests across 2 files.</p>\n<br>\n<h2>CI</h2>\n<br>\n<p>[[deployments|GitHub Actions]] (<code>.github/workflows/ci.yml</code>):</p>\n<ul>\n<li><strong>test</strong> job: editable install + <code>pytest</code></li>\n<li><strong>build</strong> job: wheel build + installed CLI smoke tests</li>\n<li>Matrix: Ubuntu + macOS, Python 3.10/3.12/3.13</li>\n</ul>\n<br>\n<h2>test_packaging.py</h2>\n<br>\n<ul>\n<li>Package importable, <code>__version__</code> exists</li>\n<li><code>get_assets_dir()</code> resolves (see [[architecture#Path Resolution]])</li>\n<li>All bundled scripts, templates, rules, commands present</li>\n</ul>\n<br>\n<h2>test_cli.py</h2>\n<br>\n<ul>\n<li><code>--help</code> and <code>--version</code> for all 14 subcommands</li>\n<li>[[cli#init (zero-arg)|init]] zero-arg: slug inference, [[integrations]] detection</li>\n<li>[[cli#sync|sync]]: dry-run, memory copy, git extraction, JSON output, [[STATUS]] stamping</li>\n<li><code>doctor --json</code> includes integrations and onboarding state</li>\n<li>Smoke test: init + doctor end-to-end</li>\n<li>Idempotency: re-running init is safe</li>\n</ul>\n<br>\n<h2>Running Tests</h2>\n<br>\n<pre><code class=\"lang-bash\">\npython -m pytest tests/ -q\n</code></pre>\n<br>\n<p>Never use bare <code>pytest</code> (see [[gotchas]]).</p>\n<br>\n<h2>See Also</h2>\n<br>\n<ul>\n<li>[[cli]] -- what&#x27;s being tested</li>\n<li>[[integrations]] -- integration test scenarios</li>\n<li>[[deployments]] -- CI pipeline</li>\n</ul>\n<br>"}, {"path": "Evidence/evidence.md", "title": "Evidence", "note_type": "evidence-root", "area": "agent-knowledge", "canonical": false, "folder": "Evidence", "is_branch_entry": false, "summary": "Raw and imported material. **Not curated truth** -- see [[MEMORY]] for that. | Branch | Contents | |--------|----------| | [[raw-evidence]] | Extracted from the project ([[git-recent]]) | | [[imported...", "html": "<h1>Evidence</h1>\n<br>\n<p>Raw and imported material. <strong>Not curated truth</strong> -- see [[MEMORY]] for that.</p>\n<br>\n<h2>Branches</h2>\n<br>\n<p>| Branch | Contents |</p>\n<p>|--------|----------|</p>\n<p>| [[raw-evidence]] | Extracted from the project ([[git-recent]]) |</p>\n<p>| [[imported-evidence]] | Backfill material (docs, session traces) |</p>\n<br>\n<h2>Rules</h2>\n<br>\n<ul>\n<li>Evidence stays here until deliberately promoted to [[MEMORY]]</li>\n<li>Generated views go to [[outputs]], not here</li>\n<li>See [[conventions]] for frontmatter requirements</li>\n</ul>\n<br>\n<h2>See Also</h2>\n<br>\n<ul>\n<li>[[MEMORY]] -- where stable facts live</li>\n<li>[[home]] -- vault root</li>\n</ul>\n<br>\n<p>#agent-knowledge #evidence</p>\n<br>"}, {"path": "Evidence/imports/click-quickstart.md", "title": "Quickstart — Click Documentation (8.3.x)", "note_type": "evidence", "area": "", "canonical": false, "folder": "Evidence", "is_branch_entry": false, "summary": "> Imported from: https://click.palletsprojects.com/en/stable/quickstart/ > Date: 2026-04-11 > This is non-canonical evidence. Verify before promoting facts to Memory/. Quickstart — Click Documentation...", "html": "<h1>Quickstart — Click Documentation (8.3.x)</h1>\n<br>\n<blockquote>Imported from: https://click.palletsprojects.com/en/stable/quickstart/  </blockquote>\n<blockquote>Date: 2026-04-11  </blockquote>\n<blockquote>This is non-canonical evidence. Verify before promoting facts to Memory/.</blockquote>\n<br>\n<p>Quickstart — Click Documentation (8.3.x)</p>\n<br>\n<h3>Navigation</h3>\n<br>\n<p>-</p>\n<p>          index</p>\n<br>\n<p>-</p>\n<p>          next |</p>\n<br>\n<p>-</p>\n<p>          previous |</p>\n<br>\n<ul>\n<li>Click Documentation (8.3.x) »</li>\n</ul>\n<br>\n<ul>\n<li>Quickstart</li>\n</ul>\n<br>\n<h1>Quickstart¶</h1>\n<br>\n<h2>Install¶</h2>\n<br>\n<p>Install from PyPI:</p>\n<br>\n<pre><code>\npip install click\n\n</code></pre>\n<br>\n<p>Installing into a virtual environment is highly recommended. We suggest Virtualenv.</p>\n<br>\n<h2>Examples¶</h2>\n<br>\n<p>Some standalone examples of Click applications are packaged with Click. They are available in the</p>\n<p><a href=\"https://github.com/pallets/click/tree/main/examples\">examples folder</a> of the repo.</p>\n<br>\n<p>-</p>\n<p><a href=\"https://github.com/pallets/click/tree/main/examples/inout\">inout</a> : A very simple example of an application that can</p>\n<p>read from files and write to files and also accept input from stdin or write to stdout.</p>\n<br>\n<p>-</p>\n<p><a href=\"https://github.com/pallets/click/tree/main/examples/validation\">validation</a> : A simple example of an application that</p>\n<p>performs custom validation of parameters in different ways.</p>\n<br>\n<p>-</p>\n<p><a href=\"https://github.com/pallets/click/tree/main/examples/naval\">naval</a> : Port of the <a href=\"http://docopt.org/\">docopt</a> naval</p>\n<p>example.</p>\n<br>\n<p>-</p>\n<p><a href=\"https://github.com/pallets/click/tree/main/examples/colors\">colors</a> : A simple example that colorizes text. Uses</p>\n<p>colorama on Windows.</p>\n<br>\n<p>-</p>\n<p><a href=\"https://github.com/pallets/click/tree/main/examples/aliases\">aliases</a> : An advanced example that implements</p>\n<p>Command Aliases.</p>\n<br>\n<p>-</p>\n<p><a href=\"https://github.com/pallets/click/tree/main/examples/imagepipe\">imagepipe</a> : A complex example that implements some</p>\n<p>Command Pipelines . It chains together image processing instructions. Requires pillow.</p>\n<br>\n<p>-</p>\n<p><a href=\"https://github.com/pallets/click/tree/main/examples/repo\">repo</a> : An advanced example that implements a</p>\n<p>Git-/Mercurial-like command line interface.</p>\n<br>\n<p>-</p>\n<p><a href=\"https://github.com/pallets/click/tree/main/examples/complex\">complex</a> : A very advanced example that implements</p>\n<p>loading subcommands dynamically from a plugin folder.</p>\n<br>\n<p>-</p>\n<p><a href=\"https://github.com/pallets/click/tree/main/examples/termui\">termui</a> : A simple example that showcases terminal UI</p>\n<p>helpers provided by click.</p>\n<br>\n<h2>Basic Concepts - Creating a Command¶</h2>\n<br>\n<p>Click is based on declaring commands through decorators. Internally, there is a non-decorator interface for advanced use</p>\n<p>cases, but it’s discouraged for high-level usage.</p>\n<br>\n<p>A function becomes a Click command line tool by decorating it through <code>command()</code>. At its simplest, just</p>\n<p>decorating a function with this decorator will make it into a callable script:</p>\n<br>\n<pre><code>\nimport click\n\n@click.command()\ndef hello():\n    click.echo(&#x27;Hello World!&#x27;)\n\n</code></pre>\n<br>\n<p>What’s happening is that the decorator converts the function into a <code>Command</code> which then can be invoked:</p>\n<br>\n<pre><code>\nif __name__ == &#x27;__main__&#x27;:\n    hello()\n\n</code></pre>\n<br>\n<p>And what it looks like:</p>\n<br>\n<pre><code>\n$ python hello.py\nHello World!\n\n</code></pre>\n<br>\n<p>And the corresponding help page:</p>\n<br>\n<pre><code>\n$ python hello.py --help\nUsage: hello.py [OPTIONS]\n\nOptions:\n  --help  Show this message and exit.\n\n</code></pre>\n<br>\n<h2>Echoing¶</h2>\n<br>\n<p>Why does this example use <code>echo()</code> instead of the regular ``<a href=\"https://docs.python.org/3/library/functions.html#print\">print()</a> function? The answer to this question is</p>\n<p>that Click attempts to support different environments consistently and to be very robust even when the environment is</p>\n<p>misconfigured. Click wants to be functional at least on a basic level even if everything is completely broken.</p>\n<br>\n<p>What this means is that the <code>echo()</code> function applies some error correction in case the terminal is misconfigured</p>\n<p>instead of dying with a ``<a href=\"https://docs.python.org/3/library/exceptions.html#UnicodeError\">UnicodeError</a>.</p>\n<br>\n<p>The echo function also supports color and other styles in output. It will automatically remove styles if the output</p>\n<p>stream is a file. On Windows, colorama is automatically installed and used. See ANSI Colors.</p>\n<br>\n<p>If you don’t need this, you can also use the <code>print()</code> construct / function.</p>\n<br>\n<h2>Nesting Commands¶</h2>\n<br>\n<p>Commands can be attached to other commands of type <code>Group</code>. This allows arbitrary nesting of scripts. As an</p>\n<p>example here is a script that implements two commands for managing databases:</p>\n<br>\n<pre><code>\n@click.group()\ndef cli():\n    pass\n\n@click.command()\ndef initdb():\n    click.echo(&#x27;Initialized the database&#x27;)\n\n@click.command()\ndef dropdb():\n    click.echo(&#x27;Dropped the database&#x27;)\n\ncli.add_command(initdb)\ncli.add_command(dropdb)\n\n</code></pre>\n<br>\n<p>As you can see, the <code>group()</code> decorator works like the <code>command()</code> decorator, but creates a <code>Group</code></p>\n<p>object instead which can be given multiple subcommands that can be attached with <code>Group.add_command()</code>.</p>\n<br>\n<p>For simple scripts, it’s also possible to automatically attach and create a command by using the <code>Group.command()</code></p>\n<p>decorator instead. The above script can instead be written like this:</p>\n<br>\n<pre><code>\n@click.group()\ndef cli():\n    pass\n\n@cli.command()\ndef initdb():\n    click.echo(&#x27;Initialized the database&#x27;)\n\n@cli.command()\ndef dropdb():\n    click.echo(&#x27;Dropped the database&#x27;)\n\n</code></pre>\n<br>\n<p>You would then invoke the <code>Group</code> in your entry points or other invocations:</p>\n<br>\n<pre><code>\nif __name__ == &#x27;__main__&#x27;:\n    cli()\n\n</code></pre>\n<br>\n<h2>Registering Commands Later¶</h2>\n<br>\n<p>Instead of using the <code>@group.command()</code> decorator, commands can be decorated with the plain <code>@command()</code> decorator</p>\n<p>and registered with a group later with <code>group.add_command()</code>. This could be used to split commands into multiple Python</p>\n<p>modules.</p>\n<br>\n<pre><code>\n    @click.command()\n    def greet():\n        click.echo(&quot;Hello, World!&quot;)\n\n</code></pre>\n<br>\n<pre><code>\n    @click.group()\n    def group():\n        pass\n\n    group.add_command(greet)\n\n</code></pre>\n<br>\n<h2>Adding Parameters¶</h2>\n<br>\n<p>To add parameters, use the <code>option()</code> and <code>argument()</code> decorators:</p>\n<br>\n<pre><code>\n@click.command()\n@click.option(&#x27;--count&#x27;, default=1, help=&#x27;number of greetings&#x27;)\n@click.argument(&#x27;name&#x27;)\ndef hello(count, name):\n    for x in range(count):\n        click.echo(f&quot;Hello {name}!&quot;)\n\n</code></pre>\n<br>\n<p>What it looks like:</p>\n<br>\n<pre><code>\n$ python hello.py --help\nUsage: hello.py [OPTIONS] NAME\n\nOptions:\n  --count INTEGER  number of greetings\n  --help           Show this message and exit.\n\n</code></pre>\n<br>\n<h2>Switching to Entry Points¶</h2>\n<br>\n<p>In the code you wrote so far there is a block at the end of the file which looks like this:</p>\n<p><code>if __name__ == &#x27;__main__&#x27;:</code>. This is traditionally how a standalone Python file looks like. With Click you can continue</p>\n<p>doing that, but a better way is to package your app with an entry point.</p>\n<br>\n<p>There are two main (and many more) reasons for this:</p>\n<br>\n<p>The first one is that installers automatically generate executable wrappers for Windows so your command line utilities</p>\n<p>work on Windows too.</p>\n<br>\n<p>The second reason is that entry point scripts work with virtualenv on Unix without the virtualenv having to be</p>\n<p>activated. This is a very useful concept which allows you to bundle your scripts with all requirements into a</p>\n<p>virtualenv.</p>\n<br>\n<p>Click is perfectly equipped to work with that and in fact the rest of the documentation will assume that you are writing</p>\n<p>applications as distributed packages.</p>\n<br>\n<p>Look at the Packaging Entry Points chapter before reading the rest as the examples assume that you will be using entry</p>\n<p>points.</p>\n<br>\n<h3>Contents</h3>\n<br>\n<ul>\n<li>Quickstart</li>\n</ul>\n<br>\n<ul>\n<li>Install</li>\n</ul>\n<br>\n<ul>\n<li>Examples</li>\n</ul>\n<br>\n<ul>\n<li>Basic Concepts - Creating a Command</li>\n</ul>\n<br>\n<ul>\n<li>Echoing</li>\n</ul>\n<br>\n<ul>\n<li>Nesting Commands</li>\n</ul>\n<br>\n<ul>\n<li>Registering Commands Later</li>\n</ul>\n<br>\n<ul>\n<li>Adding Parameters</li>\n</ul>\n<br>\n<ul>\n<li>Switching to Entry Points</li>\n</ul>\n<br>\n<h3>Navigation</h3>\n<br>\n<ul>\n<li>Overview</li>\n</ul>\n<br>\n<ul>\n<li>Previous: Frequently Asked Questions</li>\n</ul>\n<br>\n<ul>\n<li>Next: Virtualenv</li>\n</ul>\n<br>\n<h3>Quick search</h3>\n<br>\n<p>    © Copyright 2014 Pallets.</p>\n<p>      Created using <a href=\"https://www.sphinx-doc.org/\">Sphinx</a> 9.1.0.</p>\n<br>"}, {"path": "Evidence/imports/imported-evidence.md", "title": "Imported Evidence", "note_type": "evidence-imports", "area": "agent-knowledge", "canonical": false, "folder": "Evidence", "is_branch_entry": false, "summary": "Supporting material from backfill. Not canonical truth. - `existing-docs.txt` -- project documentation inventory - `doc-index.txt` -- documentation structure - `structural-summary.md` -- codebase stru...", "html": "<h1>Imported Evidence</h1>\n<br>\n<p>Supporting material from backfill. Not canonical truth.</p>\n<br>\n<h2>Expected Files</h2>\n<br>\n<ul>\n<li><code>existing-docs.txt</code> -- project documentation inventory</li>\n<li><code>doc-index.txt</code> -- documentation structure</li>\n<li><code>structural-summary.md</code> -- codebase structure analysis</li>\n</ul>\n<br>\n<h2>See Also</h2>\n<br>\n<ul>\n<li>[[evidence]] -- evidence root</li>\n<li>[[MEMORY]] -- where stable facts graduate to</li>\n<li>[[git-recent]] -- raw git evidence</li>\n<li>[[home]] -- vault root</li>\n</ul>\n<br>\n<p>#agent-knowledge #evidence</p>\n<br>"}, {"path": "Evidence/imports/obsidian-api-readme.md", "title": "Obsidian API", "note_type": "evidence", "area": "", "canonical": false, "folder": "Evidence", "is_branch_entry": false, "summary": "> Imported from: https://raw.githubusercontent.com/obsidianmd/obsidian-api/master/README.md > Date: 2026-04-11 > This is non-canonical evidence. Verify before promoting facts to Memory/. Type definiti...", "html": "<h1>Obsidian API</h1>\n<br>\n<blockquote>Imported from: https://raw.githubusercontent.com/obsidianmd/obsidian-api/master/README.md  </blockquote>\n<blockquote>Date: 2026-04-11  </blockquote>\n<blockquote>This is non-canonical evidence. Verify before promoting facts to Memory/.</blockquote>\n<br>\n<h2>Obsidian API</h2>\n<br>\n<p>Type definitions for the latest <a href=\"https://obsidian.md\">Obsidian</a> API.</p>\n<br>\n<h3>Documentation</h3>\n<br>\n<p>You can browse our Plugin API documentation at https://docs.obsidian.md/</p>\n<br>\n<p>For an example on how to create Obsidian plugins, use the template at https://github.com/obsidianmd/obsidian-sample-plugin</p>\n<br>\n<h3>Issues and API requests</h3>\n<br>\n<p>For issues with the API, or to make requests for new APIs, please go to our forum: https://forum.obsidian.md/c/developers-api/14</p>\n<br>\n<h3>Plugin structure</h3>\n<br>\n<p><code>manifest.json</code></p>\n<br>\n<ul>\n<li><code>id</code> the ID of your plugin.</li>\n<li><code>name</code> the display name of your plugin.</li>\n<li><code>author</code> the plugin author&#x27;s name.</li>\n<li><code>version</code> the version of your plugin.</li>\n<li><code>minAppVersion</code> the minimum required Obsidian version for your plugin.</li>\n<li><code>description</code> the long description of your plugin.</li>\n<li><code>isDesktopOnly</code> whether your plugin uses NodeJS or Electron APIs.</li>\n<li><code>authorUrl</code> (optional) a URL to your own website.</li>\n<li><code>fundingUrl</code> (optional) a link for users to donation to show appreciation and support plugin development.</li>\n</ul>\n<br>\n<p><code>main.js</code></p>\n<br>\n<ul>\n<li>This is the main entry point of your plugin.</li>\n<li>Import any Obsidian API using <code>require(&#x27;obsidian&#x27;)</code></li>\n<li>Import NodeJS or Electron API using <code>require(&#x27;fs&#x27;)</code> or <code>require(&#x27;electron&#x27;)</code></li>\n<li>Must export a default class which extends <code>Plugin</code></li>\n<li>Must bundle all external dependencies into this file, using Rollup, Webpack, or another javascript bundler.</li>\n</ul>\n<br>\n<h3>App Architecture</h3>\n<br>\n<p>##### The app is organized into a few major modules:</p>\n<br>\n<ul>\n<li><code>App</code>, the global object that owns everything else. You can access this via <code>this.app</code> inside your plugin. The <code>App</code> interface provides accessors for the following interfaces.</li>\n<li><code>Vault</code>, the interface that lets you interact with files and folders in the vault.</li>\n<li><code>Workspace</code>, the interface that lets you interact with panes on the screen.</li>\n<li><code>MetadataCache</code>, the interface that contains cached metadata about each markdown file, including headings, links, embeds, tags, and blocks.</li>\n</ul>\n<br>\n<p>##### Additionally, by inheriting <code>Plugin</code>, you can:</p>\n<ul>\n<li>Add a ribbon icon using <code>this.addRibbonIcon</code>.</li>\n<li>Add a status bar (bottom) element using <code>this.addStatusBarItem</code>.</li>\n<li>Add a global command, optionally with a default hotkey, using <code>this.addCommand</code>.</li>\n<li>Add a plugin settings tab using <code>this.addSettingTab</code>.</li>\n<li>Register a new kind of view using <code>this.registerView</code>.</li>\n<li>Save and load plugin data using <code>this.loadData</code> and <code>this.saveData</code>.</li>\n</ul>\n<br>\n<p>##### Registering events</p>\n<br>\n<p>For registering events from any event interfaces, such as <code>App</code> and <code>Workspace</code>, please use <code>this.registerEvent</code>, which will automatically detach your event handler when your plugin unloads:</p>\n<pre><code>\nthis.registerEvent(app.on(&#x27;event-name&#x27;, callback));\n</code></pre>\n<br>\n<p>If you register DOM events for elements that persist on the page after your plugin unloads, such as <code>window</code> or <code>document</code> events, please use <code>this.registerDomEvent</code>:</p>\n<pre><code>\nthis.registerDomEvent(element, &#x27;click&#x27;, callback);\n</code></pre>\n<br>\n<p>If you use <code>setInterval</code>, please use <code>this.registerInterval</code>:</p>\n<pre><code>\nthis.registerInterval(setInterval(callback, 1000));\n</code></pre>\n<br>"}, {"path": "Evidence/raw/git-recent.md", "title": "Git Recent", "note_type": "evidence", "area": "", "canonical": false, "folder": "Evidence", "is_branch_entry": false, "summary": "Last 30 commits. Re-generated by `agent-knowledge sync`. See [[MEMORY]] for curated insights. See [[project-overview]] for dashboard. ``` 68382ee fix: install Cursor rule for automatic agent onboardin...", "html": "<h1>Git Recent</h1>\n<br>\n<p>Last 30 commits. Re-generated by <code>agent-knowledge sync</code>.</p>\n<br>\n<p>See [[MEMORY]] for curated insights. See [[project-overview]] for dashboard.</p>\n<br>\n<pre><code>\n68382ee fix: install Cursor rule for automatic agent onboarding\na26f787 feat: pip-installable CLI with auto-detect integrations (v0.0.1)\ne2198f3 chore: finalize project knowledge integration\nf451908 add graphify sync and project knowledge tooling\n91b63b9 feat: add project knowledge operations\n5970504 feat: v2 adaptive project memory system\n88dc0bc feat: document dual memory locations (work const sidebar = document.getElementById('sidebar');
const noteView = document.getElementById('note-view');
const placeholder = document.getElementById('placeholder');
const searchInput = document.getElementById('search');

let activeItem = null;

function badge(folder) {
  return `<span class="note-badge badge-${folder}">${folder}</span>`;
}

function buildTree(notes) {
  const groups = {};
  for (const n of notes) {
    if (!groups[n.folder]) groups[n.folder] = [];
    groups[n.folder].push(n);
  }
  const order = ['Memory','Evidence','Outputs','Sessions'];
  sidebar.innerHTML = '';
  for (const folder of order) {
    if (!groups[folder]) continue;
    const div = document.createElement('div');
    div.className = 'tree-folder';
    div.dataset.folder = folder;
    const header = document.createElement('div');
    header.className = 'folder-header';
    header.innerHTML = `${folder} ${badge(folder)}`;
    header.onclick = () => children.classList.toggle('hidden');
    const children = document.createElement('div');
    children.className = 'folder-children';
    for (const note of groups[folder]) {
      const item = document.createElement('div');
      item.className = 'tree-item' + (note.is_branch_entry ? ' branch-entry' : '');
      item.dataset.path = note.path;
      const name = note.path.split('/').pop().replace('.md','');
      item.innerHTML = `${badge(folder)} ${escHtml(note.title || name)}`;
      item.title = note.path;
      item.onclick = () => showNote(note, item);
      children.appendChild(item);
    }
    div.appendChild(header);
    div.appendChild(children);
    sidebar.appendChild(div);
  }
}

function showNote(note, itemEl) {
  if (activeItem) activeItem.classList.remove('active');
  activeItem = itemEl;
  itemEl.classList.add('active');
  placeholder.classList.add('hidden');
  noteView.classList.remove('hidden');
  document.getElementById('note-title').textContent = note.title;
  document.getElementById('note-path').textContent = note.path;
  document.getElementById('note-meta-row').innerHTML = badge(note.folder) +
    (note.note_type !== 'unknown' ? ` <span style="color:var(--muted)">${escHtml(note.note_type)}</span>` : '');
  const warn = document.getElementById('non-canonical-warning');
  if (!note.canonical) {
    document.getElementById('nc-folder').textContent = note.folder;
    warn.classList.remove('hidden');
  } else {
    warn.classList.add('hidden');
  }
  document.getElementById('note-body').innerHTML = note.html;
}

function filterNotes(q) {
  const ql = q.toLowerCase();
  const filtered = ql ? DATA.notes.filter(n =>
    n.title.toLowerCase().includes(ql) ||
    n.path.toLowerCase().includes(ql) ||
    (n.summary || '').toLowerCase().includes(ql)
  ) : DATA.notes;
  buildTree(filtered);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

searchInput.addEventListener('input', e => filterNotes(e.target.value));
buildTree(DATA.notes);
</script>
</body>
</html>
